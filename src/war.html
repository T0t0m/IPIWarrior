<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPI Warrior</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>IPI Warrior</h1>

    <div class="game-wrapper">

        <!-- Contrôles Joueur 1 -->
        <div class="side-controls">
            <h3 class="p1-color">PLAYER 1</h3>
            <div class="control-box">
                <p><strong>Move</strong><br>Q-D / A-D</p>
                <p><strong>Jump</strong><br>Z / W</p>
                <p><strong>Block</strong><br>S</p>
                <p><strong>Punch</strong><br>F</p>
                <p><strong>Kick</strong><br>G</p>
                <p><strong>Ulti</strong><br>E</p>
            </div>
        </div>

        <!-- Écran de jeu -->
        <div id="game-container">

            <!-- Menu de sélection -->
            <div id="character-select">
                <h2>SELECT YOUR FIGHTERS</h2>
                <div class="selection-area">

                    <!-- Sélection Joueur 1 -->
                    <div class="player-select" id="p1-selection">
                        <h3 class="p1-color">PLAYER 1 (RED)</h3>
                        <div class="portrait-container">
                            <img src="../asset/character/fx.png" alt="FX" class="portrait selected-p1" id="p1-fx"
                                onclick="selectChar(1, '../asset/character/fx.png', 'p1-fx')">
                            <img src="../asset/character/kotlineur.png" alt="Kotlineur" class="portrait"
                                id="p1-kotlineur"
                                onclick="selectChar(1, '../asset/character/kotlineur.png', 'p1-kotlineur')">
                            <img src="../asset/character/etienne.png" alt="Etienne" class="portrait" id="p1-etienne"
                                onclick="selectChar(1, '../asset/character/etienne.png', 'p1-etienne')">
                            <img src="../asset/character/benito.png" alt="Benito" class="portrait" id="p1-benito"
                                onclick="selectChar(1, '../asset/character/benito.png', 'p1-benito')">
                            <img src="../asset/character/uber.png" alt="Uber" class="portrait" id="p1-uber"
                                onclick="selectChar(1, '../asset/character/uber.png', 'p1-uber')">
                        </div>
                    </div>

                    <!-- Sélection Joueur 2 -->
                    <div class="player-select" id="p2-selection">
                        <h3 class="p2-color">PLAYER 2 (BLUE)</h3>
                        <div class="portrait-container">
                            <img src="../asset/character/fx.png" alt="FX" class="portrait" id="p2-fx"
                                onclick="selectChar(2, '../asset/character/fx.png', 'p2-fx')">
                            <img src="../asset/character/kotlineur.png" alt="Kotlineur" class="portrait selected-p2"
                                id="p2-kotlineur"
                                onclick="selectChar(2, '../asset/character/kotlineur.png', 'p2-kotlineur')">
                            <img src="../asset/character/etienne.png" alt="Etienne" class="portrait" id="p2-etienne"
                                onclick="selectChar(2, '../asset/character/etienne.png', 'p2-etienne')">
                            <img src="../asset/character/benito.png" alt="Benito" class="portrait" id="p2-benito"
                                onclick="selectChar(2, '../asset/character/benito.png', 'p2-benito')">
                            <img src="../asset/character/uber.png" alt="Uber" class="portrait" id="p2-uber"
                                onclick="selectChar(2, '../asset/character/uber.png', 'p2-uber')">
                        </div>
                    </div>

                </div>
                <button id="start-fight-btn" onclick="startGame()">FIGHT!</button>
            </div>

            <!-- Arène de combat -->
            <canvas id="gameCanvas"></canvas>

            <!-- Interface de combat -->
            <div id="ui">
                <div class="player-ui">
                    <div class="health-bar-container" id="p1-health-container">
                        <div class="health-bar" id="p1-health"></div>
                    </div>
                    <div class="ulti-bar-container" id="p1-ulti-container">
                        <div class="ulti-bar" id="p1-ulti"></div>
                    </div>
                    <div id="p1-name" class="char-name p1-color">PLAYER 1</div>
                </div>

                <div id="timer">99</div>

                <div class="player-ui p2-ui">
                    <div class="health-bar-container" id="p2-health-container">
                        <div class="health-bar" id="p2-health"></div>
                    </div>
                    <div class="ulti-bar-container" id="p2-ulti-container">
                        <div class="ulti-bar" id="p2-ulti"></div>
                    </div>
                    <div id="p2-name" class="char-name p2-color">PLAYER 2</div>
                </div>
            </div>

            <!-- Écran de fin de partie -->
            <div id="display-text">
                <span id="win-message">PLAYER 1 WINS!</span>
                <button id="restart-btn" onclick="returnToMenu()">CHARACTER SELECT</button>
            </div>
        </div>

        <!-- Contrôles Joueur 2 -->
        <div class="side-controls">
            <h3 class="p2-color">PLAYER 2</h3>
            <div class="control-box">
                <p><strong>Move</strong><br>◄ / ►</p>
                <p><strong>Jump</strong><br>▲</p>
                <p><strong>Block</strong><br>▼</p>
                <p><strong>Punch</strong><br>R-Shift</p>
                <p><strong>Kick</strong><br>R-Ctrl</p>
                <p><strong>Ulti</strong><br>Enter</p>
            </div>
        </div>

    </div>

    <script src="war.js"></script>
</body>

</html>
