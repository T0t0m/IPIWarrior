<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPI Warrior</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>IPI Warrior</h1>

    <div id="game-container">

        <div id="character-select">
            <h2>SELECT YOUR FIGHTERS</h2>
            <div class="selection-area">
                <div class="player-select">
                    <h3 class="p1-color">PLAYER 1 (RED)</h3>
                    <div class="portrait-container">
                        <img src="asset/character/fx.png" alt="FX" class="portrait selected-p1" id="p1-fx"
                            onclick="selectChar(1, 'fx.png', 'p1-fx')">
                        <img src="asset/character/kotlineur.png" alt="Kotlineur" class="portrait" id="p1-kotlineur"
                            onclick="selectChar(1, 'kotlineur.png', 'p1-kotlineur')">
                        <img src="asset/character/etienne.png" alt="Etienne" class="portrait" id="p1-etienne"
                            onclick="selectChar(1, 'etienne.png', 'p1-etienne')">
                    </div>
                </div>

                <div class="player-select">
                    <h3 class="p2-color">PLAYER 2 (BLUE)</h3>
                    <div class="portrait-container">
                        <img src="asset/character/fx.png" alt="FX" class="portrait" id="p2-fx"
                            onclick="selectChar(2, 'fx.png', 'p2-fx')">
                        <img src="asset/character/kotlineur.png" alt="Kotlineur" class="portrait selected-p2"
                            id="p2-kotlineur" onclick="selectChar(2, 'kotlineur.png', 'p2-kotlineur')">
                        <img src="asset/character/etienne.png" alt="Etienne" class="portrait" id="p2-etienne"
                            onclick="selectChar(2, 'etienne.png', 'p2-etienne')">
                    </div>
                </div>
            </div>
            <button id="start-fight-btn" onclick="startGame()">FIGHT!</button>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="ui">
            <div class="health-bar-container" id="p1-health-container">
                <div class="health-bar" id="p1-health"></div>
            </div>
            <div id="timer">99</div>
            <div class="health-bar-container" id="p2-health-container">
                <div class="health-bar" id="p2-health"></div>
            </div>
        </div>

        <div id="display-text">
            <span id="win-message">PLAYER 1 WINS!</span>
            <button id="restart-btn" onclick="returnToMenu()">CHARACTER SELECT</button>
        </div>
    </div>

    <div id="controls-guide">
        <div class="control-column">
            <h3 class="p1-color">Player 1 (RED)</h3>
            <p><strong>Move:</strong> A / D | <strong>Jump:</strong> W</p>
            <p><strong>Punch:</strong> F | <strong>Kick:</strong> G</p>
        </div>
        <div class="control-column" style="text-align: right;">
            <h3 class="p2-color">Player 2 (BLUE)</h3>
            <p><strong>Move:</strong> Left / Right Arrow | <strong>Jump:</strong> Up Arrow</p>
            <p><strong>Punch:</strong> Right Shift | <strong>Kick:</strong> Right Ctrl</p>
        </div>
    </div>

    <script src="war.js"></script>
</body>

</html>
